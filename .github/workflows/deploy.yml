name: CD Production Deployment

on:
  workflow_run:
    workflows: ["CI Quality Assurance"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Solo despliega si el CI de main fue exitoso
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DIR }}
            
            # 1. Modo mantenimiento
            php artisan down --refresh=15 --retry=60
            
            # 2. Actualizar código (solo de main)
            git pull origin main
            
            # 3. Instalación limpia de producción (PHP)
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            
            # 4. Frontend build + SSR (si el proyecto tiene frontend instalado)
            if [ -f "package.json" ]; then
              if [ -f "package-lock.json" ]; then
                npm ci
              else
                npm install
              fi
                npm run build
                
                # Reiniciar SSR server si está configurado
                # Usa supervisord o pm2 para gestionar el proceso SSR en producción.
                # Configuración recomendada en /etc/supervisor/conf.d/inertia-ssr.conf:
                #   [program:inertia-ssr]
                #   command=php artisan inertia:start-ssr
                #   directory=/path/to/project
                #   autostart=true
                #   autorestart=true
                php artisan inertia:stop-ssr 2>/dev/null || true
                if [ -f "bootstrap/ssr/ssr.js" ]; then
                    supervisorctl restart inertia-ssr 2>/dev/null || true
                fi
            fi
            
            # 5. Migraciones y Caché de Excelencia
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            
            # 6. Reiniciar servicios de aplicación
            php artisan queue:restart
            
            # 7. Salir de mantenimiento
            php artisan up
            
            echo "🚀 Project deployed to Production by Human Supervisor."