name: CD Production Deployment

on:
  workflow_run:
    workflows: ["CI Quality Assurance"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Solo despliega si el CI de main fue exitoso
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DIR }}
            
            # 1. Modo mantenimiento
            php artisan down --refresh=15 --retry=60
            
            # 2. Actualizar código (solo de main)
            git pull origin main
            
            # 3. Instalación limpia de producción
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            
            # 4. Migraciones y Caché de Excelencia
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            
            # 5. Reiniciar servicios de aplicación
            php artisan queue:restart
            
            # 6. Salir de mantenimiento
            php artisan up
            
            echo "🚀 Project deployed to Production by Human Supervisor."