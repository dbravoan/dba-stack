name: CI Quality Assurance

on:
  push:
    branches: [ main, master, develop, dev ]
  pull_request:
    branches: [ main, master, develop, dev ]

jobs:
  tests-and-quality:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: dba_stack_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, libxml, mysql, bcmath, pdo_mysql
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock', '**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate Composer Manifest
        run: composer validate --strict --no-check-publish

      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Copy Environment File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "No .env.example found — skipping environment copy"
          fi

      - name: Check Code Style (Pint)
        run: ./vendor/bin/pint --test

      - name: Static Analysis (Larastan)
        run: |
          if [ -d src ] || [ -d app ] || [ -d tests ]; then
            ./vendor/bin/phpstan analyse --memory-limit=1G
          else
            echo "No src/app/tests directories found — skipping PHPStan"
          fi

      - name: Run Architecture Tests (Pest/PHPUnit)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ] || [ -d tests ]; then
            ./vendor/bin/phpunit --testsuite=Unit,Architecture
          else
            echo "No PHPUnit config or tests directory found — skipping Unit/Architecture tests"
          fi

      - name: Run Integration Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ] || [ -d tests ]; then
            ./vendor/bin/phpunit --testsuite=Integration
          else
            echo "No PHPUnit config or tests directory found — skipping Integration tests"
          fi

      # Frontend build validation (only if frontend is installed)
      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Frontend Dependencies
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Frontend (TypeScript + Vue + SSR)
        if: hashFiles('package.json') != ''
        run: npm run build